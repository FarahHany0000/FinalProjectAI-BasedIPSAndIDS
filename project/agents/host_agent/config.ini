# Host Agent Configuration
# Copy this file to each monitored device alongside host_agent.py
# Edit server_host to point to Laptop5 (the gateway/server)

[agent]
# Backend server address (Laptop5 gateway)
# Default 192.168.137.1 is the Windows Mobile Hotspot IP
server_host = 127.0.0.1
server_port = 5000

# Authentication key (must match backend AGENT_KEY)
agent_key = changeme

# How often to send a report (seconds)
interval = 10

# How long to sample disk/network deltas (seconds)
# The agent sleeps for this duration while measuring activity
window = 5

# Backend endpoint
endpoint = /api/agent/host-report
